<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>資料共享平台</title>
    <script>
        // =========================================================================
        // ✍️ 【最上層設定區】請在此處貼上你最新部署產生的正式 GAS 網址 (結尾必須是 /exec)
        // =========================================================================
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwlCqMugoYly1yMCE1Oaz2znDhf0dbG0_lco7tPLQIlcRqFoaCtEcdeU5yRi93Hn_r5Bg/exec";
        
        const PLATFORM_NAME = "資料共享平台";
        const START_YEAR = "2025";
        const OWNER_NAME = "施柏謙";
        const DEFAULT_THEME = "summer"; // 🌟 預設強制鎖定你最喜歡的夏日深藍海洋風格
    </script>
    <style>
        :root { 
            --card: rgba(15, 23, 42, 0.45); 
            --accent: #38bdf8; 
            --text: #f8fafc; 
            --text-muted: #cbd5e1; 
        }

        /* 夏日深藍海洋風格 */
        body { 
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%); 
            color: #f8fafc; 
            font-family: system-ui, -apple-system, sans-serif; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            transition: background 0.8s ease; 
        }

        .dashboard { 
            max-width: 800px; 
            width: 100%; 
            background: var(--card); 
            border-radius: 20px; 
            padding: 30px; 
            box-sizing: border-box; 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255,255,255,0.1); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.3); 
        }

        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 30px; 
        }

        .storage-badge { 
            background: rgba(255,255,255,0.1); 
            padding: 8px 16px; 
            border-radius: 30px; 
            font-size: 14px; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
        }

        .storage-bar { 
            width: 60px; 
            height: 6px; 
            background: rgba(255,255,255,0.2); 
            border-radius: 3px; 
            overflow: hidden; 
        }

        .storage-progress { 
            height: 100%; 
            background: #22c55e; 
            width: 0%; 
            transition: width 0.5s ease; 
        }

        .main-title { 
            text-align: center; 
            font-size: 32px; 
            margin: 20px 0 30px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 12px; 
            color: var(--accent);
        }

        .upload-zone { 
            border: 2px dashed rgba(255,255,255,0.2); 
            border-radius: 16px; 
            padding: 40px 20px; 
            text-align: center; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            background: rgba(255,255,255,0.02); 
            margin-bottom: 25px;
        }

        .upload-zone:hover { 
            border-color: var(--accent); 
            background: rgba(56, 189, 248, 0.05); 
        }

        .file-info {
            margin-top: 10px;
            font-size: 14px;
            color: var(--accent);
            word-break: break-all;
        }

        .btn-primary { 
            width: 100%; 
            background: #0ea5e9; 
            color: white; 
            border: none; 
            padding: 14px; 
            border-radius: 12px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: background 0.2s; 
            box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3); 
        }

        .btn-primary:hover:not(:disabled) { background: #0284c7; }
        .btn-primary:disabled { background: #64748b; cursor: not-allowed; box-shadow: none; }

        .ip-tracker { 
            background: rgba(0,0,0,0.2); 
            border-left: 4px solid var(--accent); 
            padding: 12px 16px; 
            border-radius: 0 8px 8px 0; 
            font-size: 13px; 
            margin-bottom: 30px; 
            font-family: monospace; 
            color: var(--text-muted);
        }

        .section-title { 
            font-size: 18px; 
            margin-bottom: 15px; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            color: var(--accent);
        }

        .date-picker-container {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 15px;
        }

        .date-picker {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
        }

        .file-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 30px; }
        
        .file-item { 
            background: rgba(255,255,255,0.04); 
            border: 1px solid rgba(255,255,255,0.05); 
            border-radius: 12px; 
            padding: 16px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            gap: 15px;
        }

        .file-meta { flex: 1; min-width: 0; }
        .file-name { font-weight: 500; margin-bottom: 4px; word-break: break-all; }
        .file-sub { font-size: 12px; color: var(--text-muted); }

        .file-actions { display: flex; gap: 8px; }
        
        .btn-action { 
            padding: 6px 16px; 
            border-radius: 8px; 
            font-size: 14px; 
            font-weight: 500; 
            cursor: pointer; 
            border: none; 
            color: white;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }
        .btn-preview { background: #0284c7; }
        .btn-download { background: #22c55e; }

        .notice-card { 
            background: rgba(255, 255, 255, 0.02); 
            border: 1px solid rgba(255,255,255,0.05); 
            border-radius: 12px; 
            padding: 20px; 
            font-size: 13px; 
            line-height: 1.8; 
            color: var(--text-muted); 
            white-space: pre-line; 
        }

        footer { text-align: center; margin-top: 40px; font-size: 12px; color: rgba(255,255,255,0.3); }
        
        .no-data { text-align: center; padding: 30px; color: var(--text-muted); font-size: 14px; background: rgba(255,255,255,0.01); border-radius: 12px; border: 1px dashed rgba(255,255,255,0.05); }
    </style>
</head>
<body>

<div class="dashboard">
    <header>
        <div class="storage-badge">
            <div class="storage-bar"><div id="storageProgress" class="storage-progress"></div></div>
            <span>儲存池負載率：<span id="storagePercent">0.0</span>%</span>
        </div>
        <div style="font-size:14px; color:rgba(255,255,255,0.5);">施柏謙 系統環境</div>
    </header>

    <div class="main-title">📁 <span id="platformName">資料共享平台</span></div>

    <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
        <input type="file" id="fileInput" style="display: none;" onchange="handleFileSelect(this)">
        <div style="font-size: 40px; margin-bottom: 10px;">📥</div>
        <div style="font-weight: 500;">點擊選取中轉共享檔案</div>
        <div id="fileInfo" class="file-info"></div>
    </div>

    <button id="uploadBtn" class="btn-primary" onclick="handleUpload()">同意條款並安全上傳</button>

    <div class="ip-tracker">
        🚀 通訊來源偵測 IP：<span id="userIpText">正在探測中...</span>
    </div>

    <div class="section-title">📂 今日資料共享平台庫</div>
    <div class="date-picker-container">
        <input type="date" id="listDatePicker" class="date-picker" onchange="fetchSharedList()">
    </div>
    
    <div id="fileList" class="file-list">
        <div class="no-data">正在連線至大數據中轉核心...</div>
    </div>

    <div class="section-title">📜 【 條款與⚖️傳輸規範 】</div>
    <div id="noticeContent" class="notice-card">正在下載最新條款須知...</div>
</div>

<footer>
    © <span id="copyrightYear">2025</span> - 2026 <span id="ownerName">施柏謙</span> All Rights Reserved.
</footer>

<script>
    let globalUserIp = "0.0.0.0";

    // 網頁初始化
    window.addEventListener('DOMContentLoaded', async () => {
        // 固定設定文字
        document.getElementById('platformName').innerText = PLATFORM_NAME;
        document.getElementById('ownerName').innerText = OWNER_NAME;
        document.getElementById('copyrightYear').innerText = START_YEAR;
        
        // 設定今日日期給外部日期選擇器
        const todayStr = getTodayString();
        document.getElementById('listDatePicker').value = todayStr;

        // 1. 同步獲取探測真实公網 IP
        try {
            const ipRes = await fetch('https://api.ipify.org?format=json');
            const ipData = await ipRes.json();
            globalUserIp = ipData.ip;
            document.getElementById('userIpText').innerText = globalUserIp;
        } catch (e) {
            document.getElementById('userIpText').innerText = "0.0.0.0 (基本防禦封鎖模式)";
        }

        // 2. 載入後端核心數據
        await fetchSystemStatus();
        await fetchSharedList();
    });

    // 取得今日日期字串 (YYYY-MM-DD)
    function getTodayString() {
        const d = new Date();
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, '0');
        const r = String(d.getDate()).padStart(2, '0');
        return `${y}-${m}-${r}`;
    }

    // 獲取系統容量與最新公告條款
    async function fetchSystemStatus() {
        try {
            // 自動加上防快取版本號
            const res = await fetch(`${GAS_URL}?action=get_sys_status&t=${Date.now()}`);
            const result = await res.json();
            if (result.status === "success") {
                document.getElementById('noticeContent').innerText = result.data.notice;
                document.getElementById('storagePercent').innerText = result.data.storagePercent;
                document.getElementById('storageProgress').style.width = result.data.storagePercent + '%';
            }
        } catch (err) {
            document.getElementById('noticeContent').innerText = "❌ 條款載入失敗，請確認 GAS 網址與網路連線狀態。";
        }
    }

    // 處理檔案選取視覺回饋
    function handleFileSelect(input) {
        const fileInfo = document.getElementById('fileInfo');
        if (input.files.length > 0) {
            fileInfo.innerText = `已選取：${input.files[0].name} (${(input.files[0].size/1024/1024).toFixed(2)} MB)`;
        } else {
            fileInfo.innerText = "";
        }
    }

    // 核心上傳控制（高規格錯誤安全攔截機制）
    async function handleUpload() {
        const fileInput = document.getElementById('fileInput');
        const uploadBtn = document.getElementById('uploadBtn');
        
        if (fileInput.files.length === 0) {
            alert("❌ 請先選取您要中轉分享的檔案！");
            return;
        }

        const file = fileInput.files[0];
        
        // 變更按鈕狀態為「正在上傳中...」並鎖定按鈕防止重複點擊
        uploadBtn.innerText = "⏳ 正在傳輸至雲端核心中...";
        uploadBtn.disabled = true;

        try {
            const reader = new FileReader();
            reader.onload = async function(e) {
                try {
                    const base64Data = e.target.result.split(',')[1];
                    const payload = {
                        action: "upload_local",
                        filename: file.name,
                        mimeType: file.type,
                        base64: base64Data,
                        uploader: "一般訪客",
                        ip: globalUserIp
                    };

                    // 向後端發送請求，網址帶上 IP 以供安全核對
                    const response = await fetch(`${GAS_URL}?ip=${globalUserIp}`, {
                        method: 'POST',
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) throw new Error("Google 閘道中斷連線");

                    const result = await response.json();

                    if (result.status === "success") {
                        alert("🎉 檔案上傳中轉成功！");
                        // 恢復按鈕原本樣貌
                        uploadBtn.innerText = "同意條款並安全上傳";
                        uploadBtn.disabled = false;
                        
                        // 清空檔案選擇器
                        fileInput.value = "";
                        document.getElementById('fileInfo').innerText = "";
                        
                        // 即時刷新今日中轉清單與容量
                        await fetchSystemStatus();
                        await fetchSharedList();
                    } else {
                        throw new Error(result.message || "後端處理遭拒");
                    }

                } catch (innerErr) {
                    // 🌟 這裡就是最關鍵的修復處！如果發生任何錯誤（包括 DriveApp 存取遭拒），立刻進到這裡！
                    console.error(innerErr);
                    alert("❌ 上傳失敗：" + innerErr.message);
                    uploadBtn.innerText = "💥 上傳失敗，請重新選取上傳"; // 強制更新按鈕文字，不再卡死！
                    uploadBtn.disabled = false;
                }
            };
            reader.readAsDataURL(file);

        } catch (globalErr) {
            console.error(globalErr);
            alert("❌ 瀏覽器檔案讀取異常！");
            uploadBtn.innerText = "💥 上傳失敗，請重新選取上傳";
            uploadBtn.disabled = false;
        }
    }

    // 載入指定日期的共享項目清單
    async function fetchSharedList() {
        const fileListContainer = document.getElementById('fileList');
        const targetDate = document.getElementById('listDatePicker').value;
        
        fileListContainer.innerHTML = '<div class="no-data">⏳ 正在同步今日核心資料庫清單...</div>';

        try {
            const payload = { action: "fetch_list", date: targetDate };
            const response = await fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify(payload)
            });

            const result = await response.json();
            
            if (result.status === "success" && result.data.length > 0) {
                fileListContainer.innerHTML = ""; // 清空文字
                result.data.forEach(item => {
                    const itemHtml = `
                        <div class="file-item">
                            <div class="file-meta">
                                <div class="file-name">📄 ${item.name}</div>
                                <div class="file-sub">上傳者：${item.uploader} | 真實 IP: ${item.ip}</div>
                            </div>
                            <div class="file-actions">
                                <a href="${item.viewUrl}" target="_blank" class="btn-action btn-preview">預覽</a>
                                <a href="${item.url}" target="_blank" class="btn-action btn-download">下載</a>
                            </div>
                        </div>
                    `;
                    fileListContainer.insertAdjacentHTML('beforeend', itemHtml);
                });
            } else {
                fileListContainer.innerHTML = `<div class="no-data">⚠️ 日期 [ ${targetDate} ] 中轉共享庫內目前無任何檔案。</div>`;
            }
        } catch (err) {
            fileListContainer.innerHTML = '<div class="no-data">❌ 無法同步資料清單，請檢查後端連線。</div>';
        }
    }
</script>

</body>
</html>
