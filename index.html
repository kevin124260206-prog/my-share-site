<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <script>
        // ==========================================
        // ✍️ 【最上層：前端自訂參數填寫區】
        // ==========================================
        // 1. 請在此貼上您「重新部署後」產生的最新 GAS 網頁應用程式 URL
        const GAS_URL = "https://script.google.com/macros/s/AKfycbytcp8A0Vw00pxayWFXamRWkNB3tiZP8-qZZ2Aqb4J4I4GBeVulPru_HsUsd8CWcMANkw/exec";
        
        // 2. 平台的名稱
        const PLATFORM_NAME = "資料共享平台";
        
        // 3. 版權宣告的創始年份
        const START_YEAR = "2025";
        
        // 4. 版權所有人姓名
        const OWNER_NAME = "施柏謙";
        
        // 5. 預設載入的背景季節風格 (spring, summer, autumn, winter)
        const DEFAULT_THEME = "summer";
        // ==========================================
    </script>
    <title>資料共享平台</title>
    <style>
        :root { --card: rgba(15, 23, 42, 0.45); --accent: #38bdf8; --text: #f8fafc; --text-muted: #cbd5e1; }
        
        body.spring { background: linear-gradient(135deg, #e8f5e9 0%, #fce4ec 100%); color: #1b5e20; }
        body.summer { background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%); color: #f8fafc; }
        body.autumn { background: linear-gradient(135deg, #fff3e0 0%, #d84315 100%); color: #3e2723; }
        body.winter { background: linear-gradient(135deg, #eceff1 0%, #37474f 100%); color: #263238; }

        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; min-height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; padding: 20px; box-sizing: border-box; transition: background 0.5s ease; }
        .main-shell { width: 100%; max-width: 800px; background: var(--card); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; padding: 40px; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); position: relative; }
        
        .top-status-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; font-size: 0.9rem; opacity: 0.8; }
        .pool-progress-container { display: flex; align-items: center; gap: 10px; flex: 1; }
        .pool-track { width: 120px; height: 8px; background: rgba(255,255,255,0.2); border-radius: 4px; overflow: hidden; }
        .pool-bar { height: 100%; width: 0%; background: #10b981; transition: width 0.6s ease; }
        
        .ctrl-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); color: inherit; padding: 8px 16px; border-radius: 12px; cursor: pointer; font-size: 0.85rem; transition: all 0.2s; font-weight: 500; }
        .ctrl-btn:hover { background: rgba(255,255,255,0.2); transform: translateY(-1px); }

        .title-block { text-align: center; margin-bottom: 40px; }
        .title-block h1 { margin: 0; font-size: 2.2rem; font-weight: 800; letter-spacing: -0.5px; }
        
        .upload-area { border: 2px dashed rgba(255,255,255,0.2); border-radius: 16px; padding: 40px 20px; text-align: center; cursor: pointer; background: rgba(255,255,255,0.02); transition: all 0.2s ease; margin-bottom: 24px; }
        .upload-area:hover { border-color: var(--accent); background: rgba(56, 189, 248, 0.04); }
        .upload-icon { font-size: 2.5rem; margin-bottom: 12px; display: block; }
        
        .primary-submit-btn { width: 100%; padding: 16px; background: #38bdf8; border: none; border-radius: 14px; color: #0f172a; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 12px rgba(56, 189, 248, 0.2); }
        .primary-submit-btn:hover { background: #7dd3fc; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(56, 189, 248, 0.3); }
        .primary-submit-btn:disabled { background: rgba(255,255,255,0.1) !important; color: rgba(255,255,255,0.3) !important; cursor: not-allowed; box-shadow: none; }

        .ip-tracker-banner { background: rgba(0,0,0,0.15); padding: 12px 20px; border-radius: 12px; font-size: 0.9rem; margin: 24px 0; display: flex; align-items: center; gap: 8px; border-left: 4px solid var(--accent); }
        
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-top: 40px; margin-bottom: 20px; }
        .section-header h2 { margin: 0; font-size: 1.3rem; font-weight: 700; }
        .archive-date-picker { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: inherit; padding: 6px 12px; outline: none; font-size: 0.9rem; cursor: pointer; }

        .shared-list { display: flex; flex-direction: column; gap: 12px; max-height: 400px; overflow-y: auto; margin-bottom: 40px; padding-right: 4px; }
        .shared-item { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 14px; padding: 18px 20px; display: flex; justify-content: space-between; align-items: center; transition: all 0.2s; }
        .shared-item:hover { background: rgba(255,255,255,0.06); }
        .item-meta { display: flex; flex-direction: column; gap: 4px; max-width: 65%; }
        .item-title { font-weight: 600; font-size: 1.05rem; word-break: break-all; }
        .item-subtext { font-size: 0.8rem; opacity: 0.6; }
        
        .btn-group { display: flex; gap: 8px; }
        .btn-group button { border: none; padding: 8px 16px; border-radius: 10px; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        .view-btn { background: #38bdf8; color: #0f172a; }
        .view-btn:hover { background: #7dd3fc; }
        .download-btn { background: rgba(255,255,255,0.1); color: inherit; border: 1px solid rgba(255,255,255,0.1); }
        .download-btn:hover { background: rgba(255,255,255,0.15); }
        .del-btn { background: #ef4444; color: #ffffff; }
        .del-btn:hover { background: #f87171; }

        .terms-card { background: rgba(0,0,0,0.12); border-radius: 16px; padding: 24px; font-size: 0.9rem; line-height: 1.6; opacity: 0.85; border: 1px solid rgba(255,255,255,0.02); }
        .terms-title { font-weight: 700; margin-bottom: 12px; color: var(--accent); font-size: 1rem; }
        .terms-card div { white-space: pre-wrap; }

        /*彈出視窗樣式*/
        .modal-mask { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-shell { background: #1e293b; color: #f8fafc; width: 100%; max-width: 480px; border-radius: 20px; padding: 30px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); position: relative; }
        .modal-close-trigger { position: absolute; top: 20px; right: 20px; background: none; border: none; color: #94a3b8; font-size: 1.5rem; cursor: pointer; }
        .modal-headline { font-size: 1.3rem; font-weight: 700; margin-bottom: 24px; display: flex; align-items: center; gap: 8px; }
        
        .form-row { margin-bottom: 20px; }
        .form-row label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 8px; color: #94a3b8; }
        .form-row input, .form-row select, .form-row textarea { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #334155; border-radius: 10px; color: #f8fafc; outline: none; font-size: 0.95rem; box-sizing: border-box; }
        .form-row input:focus, .form-row select:focus, .form-row textarea:focus { border-color: #38bdf8; }

        .footer-credits { text-align: center; margin-top: 40px; font-size: 0.8rem; opacity: 0.5; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 20px; }

        /* 預覽 Modal 專用樣式 */
        .preview-modal-shell { max-width: 90% !important; width: 90% !important; height: 85vh; display: flex; flex-direction: column; }
        .preview-body { flex: 1; width: 100%; height: 100%; margin-top: 10px; background: #fff; border-radius: 8px; overflow: hidden; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body class="summer">

    <div class="main-shell">
        <div class="top-status-bar">
            <div class="pool-progress-container">
                <span>雲端儲存負載：</span>
                <div class="pool-track"><div class="pool-bar" id="pool-usage-bar"></div></div>
                <span id="pool-usage-text">0.0%</span>
            </div>
            <button class="ctrl-btn" id="ctrl-hub-trigger" onclick="openLoginModal()">最高指揮中心</button>
        </div>

        <div class="title-block">
            <h1 id="platform-title-text">資料共享平台</h1>
        </div>

        <input type="file" id="file-selector" style="display: none;" onchange="onFileSelected(this)">
        
        <div class="upload-area" onclick="document.getElementById('file-selector').click()" id="drop-zone">
            <span class="upload-icon">☁️</span>
            <p id="upload-status-text">點擊此處選擇要共享的中轉檔案</p>
        </div>

        <button class="primary-submit-btn" id="upload-trigger-btn" onclick="startSecureUpload()" disabled>
            同意規範並安全上傳
        </button>

        <div class="ip-tracker-banner">
            <span>🚀 偵測到您的傳輸來源 IP : <strong id="detected-ip">探測中...</strong></span>
        </div>

        <div class="section-header">
            <h2>📂 今日中轉共享檔案庫</h2>
            <input type="date" class="archive-date-picker" id="target-archive-date" onchange="loadSharedList()">
        </div>

        <div class="shared-list" id="shared-list-box">
            </div>

        <div class="terms-card">
            <div class="terms-title">📜 【 使用條款 與 法律免責規範 】</div>
            <div id="notice-text-box">載入中...</div>
        </div>

        <div class="footer-credits" id="footer-text">
            &copy; 2025 施柏謙 All Rights Reserved.
        </div>
    </div>

    <div class="modal-mask" id="loginModal">
        <div class="modal-shell">
            <button class="modal-close-trigger" onclick="closeModal('loginModal')">&times;</button>
            <div class="modal-headline">🔐 安全核驗</div>
            <div class="form-row">
                <label>請輸入管理權限安全金鑰 (Password)</label>
                <input type="password" id="admin-pass-input" placeholder="請輸入密碼...">
            </div>
            <div style="display: flex; gap: 12px; margin-top: 30px;">
                <button class="ctrl-btn" style="flex: 1; padding: 12px;" onclick="closeModal('loginModal')">取消</button>
                <button class="primary-submit-btn" style="flex: 1; padding: 12px; box-shadow: none;" onclick="runAdminLogin()">確認登入</button>
            </div>
        </div>
    </div>

    <div class="modal-mask" id="controlModal">
        <div class="modal-shell" style="max-width: 550px;">
            <button class="modal-close-trigger" onclick="closeModal('controlModal')">&times;</button>
            <div class="modal-headline">⚙️ 最高核心指揮控制中心</div>
            
            <div class="form-row">
                <label>當前站點視覺季節主題風格 (Theme)</label>
                <select id="theme-select">
                    <option value="spring">春季風格 (優雅粉綠)</option>
                    <option value="summer">夏季風格 (極致深藍藍黑)</option>
                    <option value="autumn">秋季風格 (落葉暖橘)</option>
                    <option value="winter">冬季風格 (冰雪沉穩灰)</option>
                </select>
            </div>
            
            <div class="form-row">
                <label>公告須知與法律免責內容修改 (Notice)</label>
                <textarea id="edit-notice-text" rows="8" style="resize: vertical; font-family: inherit;"></textarea>
            </div>

            <div style="border-top: 1px dashed rgba(255,255,255,0.1); margin-top: 25px; padding-top: 20px; display: flex; justify-content: space-between; align-items: center;">
                <button class="ctrl-btn" style="background: #ef4444; color: #fff;" onclick="runAdminLogout()">登出管理端</button>
                <button class="primary-submit-btn" style="width: auto; padding: 12px 24px; box-shadow: none;" onclick="saveSysSettings()">發佈系統設定變更</button>
            </div>
        </div>
    </div>

    <div class="modal-mask" id="previewModal">
        <div class="modal-shell preview-modal-shell">
            <button class="modal-close-trigger" onclick="closePreview()">&times;</button>
            <div class="modal-headline" id="modal-title">👀 線上預覽</div>
            <div class="preview-body" id="modal-body"></div>
        </div>
    </div>

    <script>
        let currentIp = "0.0.0.0";
        let fileBase64 = "";
        let targetFileName = "";
        
        let adminRole = "guest"; 
        let adminCtrlPassword = ""; // 🛠️ 邏輯修正：本地安全紀錄登入密碼，以便發佈設定時進行金鑰驗證

        // 頁面初始化
        document.getElementById('platform-title-text').innerText = PLATFORM_NAME;
        document.getElementById('target-archive-date').valueAsDate = new Date();
        document.getElementById('footer-text').innerHTML = `&copy; ${START_YEAR} ${OWNER_NAME} All Rights Reserved.`;
        document.body.className = DEFAULT_THEME;

        window.onload = function() {
            getIpAddress().then(() => {
                syncSystemStatus();
            });
        };

        function log(msg) { console.log(`[System Log] ${msg}`); }

        function getIpAddress() {
            return fetch('https://api.ipify.org?format=json')
                .then(res => res.json())
                .then(data => {
                    currentIp = data.ip;
                    document.getElementById('detected-ip').innerText = currentIp;
                })
                .catch(err => {
                    log("無法取得公開IP，將啟用防禦性預設IP");
                    currentIp = "127.0.0.1";
                    document.getElementById('detected-ip').innerText = currentIp + " (保護模式)";
                });
        }

        // 同步拉取後端最新系統狀態（包含容量、公告、主題風格、今日清單）
        function syncSystemStatus() {
            log("正在同步後端核心參數資料...");
            const targetDate = document.getElementById('target-archive-date').value;
            
            fetch(`${GAS_URL}?action=get_sys_status&ip=${currentIp}&date=${targetDate}`)
                .then(res => res.json())
                .then(data => {
                    if (data.status === "success") {
                        document.getElementById('pool-usage-bar').style.width = data.storageRate;
                        document.getElementById('pool-usage-text').innerText = data.storageRate;
                        
                        document.getElementById('notice-text-box').innerText = data.noticeContent;
                        
                        document.body.className = data.activeTheme;
                        document.getElementById('theme-select').value = data.activeTheme;
                        document.getElementById('edit-notice-text').value = data.noticeContent;

                        renderFileList(data.fileList, adminRole === "supreme");
                    } else {
                        log("後端回報同步失敗: " + data.message);
                    }
                })
                .catch(err => log("通訊異常，無法與中轉核心同步: " + err));
        }

        function loadSharedList() {
            const targetDate = document.getElementById('target-archive-date').value;
            fetch(`${GAS_URL}?action=fetch_file_list&date=${targetDate}&ip=${currentIp}`)
                .then(res => res.json()).then(data => {
                    if(data.status === "success") {
                        renderFileList(data.data, adminRole === "supreme");
                    }
                });
        }

        function renderFileList(list, isControlMode) {
            const listDiv = document.getElementById('shared-list-box');
            if (!list || list.length === 0) {
                listDiv.innerHTML = `<div style="text-align:center; opacity:0.5; padding: 30px; font-size:0.95rem;">📅 此歸檔日期查無任何中轉共享檔案紀錄</div>`;
                return;
            }
            let html = "";
            list.forEach(item => {
                let maskIp = item.ip;
                if(maskIp && maskIp !== "0.0.0.0") {
                    let parts = maskIp.split('.');
                    if(parts.length === 4) maskIp = `${parts[0]}.${parts[1]}.${parts[2]}.***`;
                }
                const showDelete = (isControlMode === true || currentIp === item.ip);
                
                let googleDownloadUrl = item.url;
                let googlePreviewUrl = item.viewUrl || item.url;

                html += `
                    <div class="shared-item">
                        <div class="item-meta">
                            <span class="item-title">${item.name}</span>
                            <span class="item-subtext">來源：${maskIp} | 流水號：${item.id.substring(0,8)}...</span>
                        </div>
                        <div class="btn-group">
                            <button class="view-btn" onclick="openPreview('${item.name}', '${googlePreviewUrl}')">預覽</button>
                            <button class="download-btn" onclick="window.open('${googleDownloadUrl}')">下載</button>
                            ${showDelete ? `<button class="del-btn" onclick="runDeleteFile('${item.id}', ${isControlMode})">刪除</button>` : ''}
                        </div>
                    </div>
                `;
            });
            listDiv.innerHTML = html;
        }

        function openPreview(fileName, previewUrl) {
            document.getElementById('modal-title').innerText = `👀 線上預覽：${fileName}`;
            document.getElementById('modal-body').innerHTML = `<iframe src="${previewUrl}" style="width:100%; height:100%; border:none;"></iframe>`;
            document.getElementById('previewModal').style.display = "flex";
        }
        function closePreview() { document.getElementById('previewModal').style.display = "none"; document.getElementById('modal-body').innerHTML = ""; }

        function onFileSelected(input) {
            if (input.files.length === 0) return;
            const file = input.files[0];
            targetFileName = file.name;
            
            document.getElementById('upload-status-text').innerHTML = `<span style="color:#10b981; font-weight:700;">已就緒：${targetFileName}</span>`;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                fileBase64 = e.target.result.split(',')[1];
                document.getElementById('upload-trigger-btn').disabled = false;
            };
            reader.readAsDataURL(file);
        }

        function startSecureUpload() {
            const btn = document.getElementById('upload-trigger-btn');
            btn.disabled = true;
            btn.innerText = "加密安全傳輸中，請勿關閉網頁...";
            
            fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: "upload_file",
                    fileName: targetFileName,
                    fileData: fileBase64,
                    ip: currentIp
                })
            })
            .then(res => res.json())
            .then(data => {
                alert(data.message);
                fileBase64 = ""; targetFileName = "";
                document.getElementById('file-selector').value = "";
                document.getElementById('upload-status-text').innerText = "點擊此處選擇要共享的中轉檔案";
                syncSystemStatus();
            })
            .catch(err => {
                alert("❌ 傳輸核心異常，檔案中轉同步失敗。");
                btn.disabled = false;
                btn.innerText = "同意規範並安全上傳";
            });
        }

        function runDeleteFile(fileId, isCtrlMode) {
            if(!confirm("確定要安全移除此共享檔案嗎？")) return;
            fetch(`${GAS_URL}?ip=${currentIp}`, {
                method: 'POST',
                body: JSON.stringify({ action: "delete_file", fileId: fileId, isCtrlMode: isCtrlMode })
            })
            .then(res => res.json()).then(data => {
                alert(data.message);
                syncSystemStatus();
            }).catch(err => alert("通訊錯誤，無法移除。"));
        }

        function openLoginModal() {
            if (adminRole === "supreme") {
                document.getElementById('controlModal').style.display = "flex";
            } else {
                document.getElementById('loginModal').style.display = "flex";
            }
        }
        function closeModal(id) { document.getElementById(id).style.display = "none"; }

        function runAdminLogin() {
            const pass = document.getElementById('admin-pass-input').value;
            if(!pass) return alert("金鑰不可為空");
            
            log("正在安全校準管理金鑰...");
            fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify({ action: "admin_verify", password: pass })
            })
            .then(res => res.json())
            .then(data => {
                if(data.status === "success") {
                    adminRole = "supreme";
                    adminCtrlPassword = pass; // 🛠️ 修正：密碼暫存於前端以便後端核驗
                    document.getElementById('admin-pass-input').value = "";
                    closeModal('loginModal');
                    document.getElementById('ctrl-hub-trigger').innerText = "⚡ 核心控制中";
                    document.getElementById('controlModal').style.display = "flex";
                    syncSystemStatus();
                } else {
                    alert(data.message);
                }
            })
            .catch(err => alert("驗證通訊失敗"));
        }

        function runAdminLogout() {
            adminRole = "guest";
            adminCtrlPassword = "";
            document.getElementById('ctrl-hub-trigger').innerText = "最高指揮中心";
            closeModal('controlModal');
            syncSystemStatus();
            alert("已安全登出控制總署。");
        }

        // 🛠️ 核心修正：儲存全局設定函數，完美對接後端的參數名稱
        function saveSysSettings() {
            if (adminRole !== "supreme") {
                alert("權限不足！");
                return;
            }
            const selectedTheme = document.getElementById('theme-select').value;
            const editedNotice = document.getElementById('edit-notice-text').value;
            
            if (!confirm("確定要發佈新的系統設定變更嗎？這將會即時影響所有訪客看到的介面。")) return;
            
            log("正在發佈系統設定變更...");
            fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: "update_sys_settings",
                    supremePassword: adminCtrlPassword, // 🛠️ 對接後端的 param.supremePassword 驗證機制
                    theme: selectedTheme,
                    notice: editedNotice
                })
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === "success") {
                    alert(data.message);
                    closeModal('controlModal');
                    syncSystemStatus();
                } else {
                    alert(data.message);
                }
            })
            .catch(err => {
                log("發佈設定時發生錯誤: " + err);
                alert("通訊異常，設定儲存失敗。");
            });
        }
    </script>
</body>
</html>
