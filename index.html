<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>資料共享平台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #050b14 0%, #102a45 100%);
            --card-bg: rgba(25, 42, 70, 0.6);
            --card-border: rgba(50, 100, 150, 0.4);
            --text-neon: #4fc3f7;
            --btn-preview: #0288d1;
            --btn-download: #00c853;
            --btn-delete: #d50000;
        }

        .theme-dark-stealth {
            --bg-gradient: linear-gradient(135deg, #0a0a0a 0%, #1a1a1c 100%);
            --card-bg: rgba(30, 30, 35, 0.7);
            --card-border: rgba(80, 80, 85, 0.4);
            --text-neon: #b388ff;
            --btn-preview: #673ab7;
            --btn-download: #00b0ff;
            --btn-delete: #ff1744;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Microsoft JhengHei", sans-serif; }
        body { background: var(--bg-gradient); color: #ffffff; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; transition: background 0.5s ease; }
        .container { width: 100%; max-width: 800px; background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 16px; padding: 30px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); backdrop-filter: blur(8px); position: relative; }
        
        .header-status { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; font-size: 14px; color: #b0bec5; }
        .status-bar { display: flex; align-items: center; gap: 8px; }
        .status-progress { width: 100px; height: 8px; background: #37474f; border-radius: 4px; overflow: hidden; }
        .status-fill { height: 100%; width: 0%; background: #00e676; transition: width 0.5s ease; }
        .admin-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 13px; transition: all 0.3s; }
        .admin-btn:hover { background: rgba(255,255,255,0.2); box-shadow: 0 0 10px rgba(255,255,255,0.2); }

        .title-area { text-align: center; margin-bottom: 30px; }
        .title-area h1 { font-size: 28px; letter-spacing: 2px; color: var(--text-neon); text-shadow: 0 0 10px var(--text-neon); display: flex; align-items: center; justify-content: center; gap: 12px; }
        
        #maintenance-banner { background: #ffd600; color: #000000; padding: 10px; border-radius: 8px; margin-bottom: 25px; display: none; font-weight: bold; overflow: hidden; position: relative; white-space: nowrap; }
        .marquee-text { display: inline-block; padding-left: 100%; animation: marquee 15s linear infinite; }
        @keyframes marquee { 0% { transform: translate3d(0, 0, 0); } 100% { transform: translate3d(-100%, 0, 0); } }

        .upload-zone { border: 2px dashed var(--card-border); border-radius: 12px; padding: 40px 20px; text-align: center; cursor: pointer; background: rgba(0,0,0,0.2); transition: all 0.3s; margin-bottom: 25px; }
        .upload-zone:hover { border-color: var(--text-neon); background: rgba(0,0,0,0.3); }
        .upload-zone i { font-size: 48px; color: var(--text-neon); margin-bottom: 15px; }
        .upload-zone p { font-size: 16px; color: #cfd8dc; }

        .submit-btn { width: 100%; padding: 14px; background: #0091ea; border: none; border-radius: 8px; color: #fff; font-size: 16px; font-weight: bold; cursor: pointer; transition: all 0.3s; box-shadow: 0 4px 14px rgba(0,145,234,0.4); display: flex; align-items: center; justify-content: center; gap: 8px; }
        .submit-btn:hover { background: #00b0ff; transform: translateY(-1px); }
        .submit-btn:disabled { background: #546e7a !important; box-shadow: none !important; cursor: not-allowed; }

        .ip-bar { background: rgba(0,0,0,0.4); border-left: 4px solid var(--text-neon); padding: 10px 15px; border-radius: 4px; font-size: 13px; color: #b0bec5; margin: 20px 0; display: flex; align-items: center; gap: 8px; }

        .section-title { font-size: 18px; margin-bottom: 15px; color: var(--text-neon); display: flex; align-items: center; justify-content: space-between; }
        .date-picker-wrap { display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.3); padding: 4px 10px; border-radius: 6px; border: 1px solid var(--card-border); }
        .date-picker-wrap input { background: transparent; border: none; color: #fff; outline: none; cursor: pointer; font-size: 14px; }
        
        .file-list { display: flex; flex-direction: column; gap: 12px; max-height: 350px; overflow-y: auto; margin-bottom: 25px; padding-right: 5px; }
        .file-item { background: rgba(0,0,0,0.25); border: 1px solid rgba(255,255,255,0.05); border-radius: 8px; padding: 15px; display: flex; justify-content: space-between; align-items: center; transition: all 0.2s; }
        .file-item:hover { background: rgba(255,255,255,0.03); border-color: var(--card-border); }
        .file-info { display: flex; flex-direction: column; gap: 6px; max-width: 65%; }
        .file-name { font-size: 16px; font-weight: bold; word-break: break-all; display: flex; align-items: center; gap: 8px; }
        .file-meta { font-size: 12px; color: #90a4ae; }
        .file-actions { display: flex; gap: 8px; }
        .action-btn { border: none; padding: 8px 16px; border-radius: 6px; color: #fff; font-size: 14px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: background 0.2s; }
        .btn-prev { background: var(--btn-preview); }
        .btn-down { background: var(--btn-download); }
        .btn-del { background: var(--btn-delete); }

        .rules-box { background: rgba(0,0,0,0.3); border: 1px dashed rgba(255,255,255,0.1); border-radius: 8px; padding: 15px; font-size: 13px; color: #b0bec5; line-height: 1.8; }
        .rules-title { font-size: 14px; font-weight: bold; color: #ffb74d; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }

        /* Modals */
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.75); backdrop-filter: blur(4px); display: none; justify-content: center; align-items: center; z-index: 999; }
        .modal-box { width: 100%; max-width: 500px; background: #152238; border: 1px solid var(--card-border); border-radius: 12px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); position: relative; }
        .modal-dark-stealth { background: #141416 !important; }
        .modal-close { position: absolute; top: 15px; right: 15px; font-size: 20px; color: #90a4ae; cursor: pointer; }
        .modal-title { font-size: 20px; color: var(--text-neon); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 14px; color: #b0bec5; margin-bottom: 6px; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px; background: rgba(0,0,0,0.3); border: 1px solid var(--card-border); border-radius: 6px; color: #fff; outline: none; font-size: 14px; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 8px; }
        .tab-item { padding: 6px 12px; cursor: pointer; color: #90a4ae; font-size: 14px; border-radius: 4px; }
        .tab-item.active { background: var(--text-neon); color: #000; font-weight: bold; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* 🚨 85% 防爆倉專用警告視窗樣式 */
        .purge-alert-box { border: 2px solid #ff1744 !important; background: #260f14 !important; box-shadow: 0 0 20px rgba(255,23,68,0.6) !important; }
        .purge-text-highlight { color: #ff5252; font-weight: bold; font-size: 15px; line-height: 1.6; background: rgba(0,0,0,0.3); padding: 12px; border-radius: 6px; margin-bottom: 20px; border-left: 4px solid #ff1744; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        ::-webkit-scrollbar-thumb { background: var(--card-border); border-radius: 3px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-status">
            <div class="status-bar">
                <span>儲存池負載率：</span>
                <div class="status-progress"><div class="status-fill" id="pool-fill"></div></div>
                <span id="pool-text">0.0%</span>
            </div>
            <button class="admin-btn" id="admin-hub-btn" onclick="openLoginModal()"><i class="fa-solid fa-cube"></i> 管理端環境</button>
        </div>

        <div id="maintenance-banner">
            <div class="marquee-text" id="maintenance-text"></div>
        </div>

        <div class="title-area">
            <h1><i class="fa-solid fa-folder-open"></i> 資料共享平台</h1>
        </div>

        <input type="file" id="file-input" style="display: none;" onchange="handleFileSelect(this)">

        <div class="upload-zone" onclick="document.getElementById('file-input').click()" id="drop-zone">
            <i class="fa-solid fa-cloud-arrow-up"></i>
            <p id="upload-hint">點擊選取或拖曳共享檔案至此</p>
        </div>

        <button class="submit-btn" id="upload-btn" onclick="executeUpload()" disabled>
            <i class="fa-solid fa-shield-halved"></i> 同意條款並安全上傳
        </button>

        <div class="ip-bar">
            <i class="fa-solid fa-rocket"></i> 
            <span>通訊來源偵測 IP : <strong id="user-ip">探測中...</strong></span>
        </div>

        <div class="section-title">
            <span><i class="fa-solid fa-box-archive"></i> 今日資料共享平台庫</span>
            <div class="date-picker-wrap">
                <i class="fa-solid fa-calendar-days"></i>
                <input type="date" id="archive-date" onchange="fetchSharedList()">
            </div>
        </div>

        <div class="file-list" id="file-list-container"></div>

        <div class="rules-box">
            <div class="rules-title"><i class="fa-solid fa-gavel"></i> 【 條款與 ⚖️ 傳輸規範 】</div>
            <div id="rules-content-div"></div>
        </div>
    </div>

    <div class="modal-overlay" id="purge-overlay" style="z-index: 10000;">
        <div class="modal-box purge-alert-box">
            <div class="modal-title" style="color:#ff1744;"><i class="fa-solid fa-triangle-exclamation"></i> 核心儲存池容量嚴重超載警告</div>
            <div class="purge-text-highlight" id="purge-alert-message">
                </div>
            <button class="submit-btn" style="background:#ff1744; box-shadow: 0 4px 14px rgba(255,23,68,0.4);" onclick="acknowledgePurgeNotification()">
                <i class="fa-solid fa-user-check"></i> 我知道了，並記錄於後台
            </button>
        </div>
    </div>

    <div class="modal-overlay" id="login-overlay">
        <div class="modal-box" id="login-box">
            <i class="fa-solid fa-xmark modal-close" onclick="closeModal('login-overlay')"></i>
            <div class="modal-title"><i class="fa-solid fa-lock"></i> 管理員安全核驗</div>
            <div class="form-group">
                <label>管理員帳號</label>
                <input type="text" id="login-user">
            </div>
            <div class="form-group">
                <label>安全防禦金鑰 (密碼)</label>
                <input type="password" id="login-pass">
            </div>
            <div style="display: flex; gap:12px; margin-top:25px;">
                <button class="action-btn" style="background:#546e7a; flex:1; justify-content:center;" onclick="closeModal('login-overlay')">取消</button>
                <button class="action-btn" style="background:#0091ea; flex:1; justify-content:center;" onclick="executeLogin()">安全登入</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="admin-overlay">
        <div class="modal-box" id="admin-box" style="max-width: 650px;">
            <i class="fa-solid fa-xmark modal-close" onclick="closeModal('admin-overlay')"></i>
            <div class="modal-title"><i class="fa-solid fa-gear"></i> 核心後端控制總署</div>
            
            <div class="tabs">
                <div class="tab-item active" onclick="switchTab(0)">系統配置</div>
                <div class="tab-item" id="tab-card-nav" onclick="switchTab(1)" style="display:none;">帳密權限核發</div>
                <div class="tab-item" onclick="switchTab(2)">自動清理防禦</div>
                <div class="tab-item" style="color:#ff1744; margin-left:auto; font-weight:bold;" onclick="executeLogout()">登出</div>
            </div>

            <div class="tab-content active" id="tab-0">
                <div class="form-group">
                    <label>當前站點視覺主題風格</label>
                    <select id="cfg-theme">
                        <option value="ocean">夏日深藍海洋風格</option>
                        <option value="stealth">極致匿蹤沉穩黑</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>前端條款與傳輸規範公告內容</label>
                    <textarea id="cfg-rules" rows="3"></textarea>
                </div>
                <div style="border-top:1px dashed rgba(255,255,255,0.1); padding-top:10px;">
                    <div style="font-size:14px; font-weight:bold; color:#ffb74d; margin-bottom:8px;">修改個人帳密</div>
                    <div class="form-group"><label>新帳號</label><input type="text" id="cfg-my-user"></div>
                    <button class="action-btn" style="background:#00c853; font-size:11px; padding:4px 8px; margin-bottom:10px;" onclick="updateAdminProfile('user')">更新帳號名</button>
                    <div class="form-group"><label>新密碼</label><input type="password" id="cfg-my-pass"></div>
                    <button class="action-btn" style="background:#00c853; font-size:11px; padding:4px 8px;" onclick="updateAdminProfile('pass')">重設安全密碼</button>
                </div>
                <button class="submit-btn" style="margin-top:15px;" onclick="saveGlobalSettings()">儲存全局系統設定</button>
            </div>

            <div class="tab-content" id="tab-1">
                <div style="background:rgba(0,0,0,0.2); padding:10px; border-radius:6px; margin-bottom:10px;">
                    <div style="display:flex; gap:8px; margin-bottom:8px;">
                        <input type="text" id="new-card-user" placeholder="帳號">
                        <input type="password" id="new-card-pass" placeholder="密碼">
                    </div>
                    <div style="display:flex; gap:8px;">
                        <input type="text" id="new-card-name" placeholder="顯示花名">
                        <button class="action-btn" style="background:#0091ea;" onclick="issueNewCard()">確認核發</button>
                    </div>
                </div>
                <div id="card-list-container" style="max-height:150px; overflow-y:auto;"></div>
            </div>

            <div class="tab-content" id="tab-2">
                <div style="background:rgba(255,23,68,0.1); padding:12px; border-radius:6px; border:1px solid rgba(255,23,68,0.3); margin-bottom:15px; font-size:13px;">
                    <i class="fa-solid fa-circle-info"></i> 管理員可在此手動提前發動「預約強制清理」排程。
                </div>
                <button class="submit-btn" style="background:#ffb74d; color:#000; margin-bottom:20px;" onclick="registerAdminPurgeReservation()">
                    <i class="fa-solid fa-clock"></i> 立即發布「一週後自動銷毀3年前檔案」預約排程
                </button>
                
                <label style="font-size:14px; color:#b0bec5; display:block; margin-bottom:8px;"><i class="fa-solid fa-list-check"></i> 當前生效中之清理排程與撤銷管理</label>
                <div id="purge-schedule-list" style="max-height:150px; overflow-y:auto; background:rgba(0,0,0,0.2); padding:10px; border-radius:6px;">
                    </div>
            </div>
        </div>
    </div>

    <script>
        // ⚠️ 必填區：請務必更換為你的 Google Apps Script 部署網址
        const GAS_URL = "https://script.google.com/macros/s/AKfycbycHCtFzkP9B7KgH-eDFT1RPgt9Pf_9Lf1uj53JB0iulVkjtboTg7snEqDfpyUXPo4nYg/exec?v=2";

        let globalUserIp = "0.0.0.0";
        let selectedFileBase64 = "";
        let selectedFileName = "";
        let cacheEngine = null;
        let adminSession = null;

        document.getElementById('archive-date').valueAsDate = new Date();

        window.onload = async function() {
            await detectUserIp();
            await triggerCachePreload();
        };

        // 獲取使用者 IP
        async function detectUserIp() {
            try {
                const res = await fetch("https://api.ipify.org?format=json");
                const data = await res.json();
                globalUserIp = data.ip;
                document.getElementById('user-ip').innerText = globalUserIp;
            } catch(e) { document.getElementById('user-ip').innerText = "探測超時，請檢查連線"; }
        }

        // 預載資料與 85% 預警判斷
        async function triggerCachePreload() {
            try {
                const res = await fetch(`${GAS_URL}?action=preload_engine&ip=${globalUserIp}`);
                cacheEngine = await res.json();
                
                document.getElementById('pool-fill').style.width = cacheEngine.poolRate;
                document.getElementById('pool-text').innerText = cacheEngine.poolRate;
                document.getElementById('rules-content-div').innerHTML = cacheEngine.rulesContent;
                applyVisualTheme(cacheEngine.siteTheme);

                // 🚨 85% 容量防爆倉彈窗邏輯
                const isAcknowledged = sessionStorage.getItem("purge_ack"); 
                if (parseFloat(cacheEngine.poolRate) >= 85.0 && !isAcknowledged) {
                    const today = new Date();
                    const targetYear = today.getFullYear() - 3;
                    const nextWeek = new Date(today.getTime() + 7 * 24 * 60 * 60 * 1000);
                    const dateStr = `${nextWeek.getFullYear()}年${nextWeek.getMonth()+1}月${nextWeek.getDate()}日`;

                    document.getElementById('purge-alert-message').innerHTML = `
                        ⚠️ 【儲存池爆倉預警通告】<br>
                        當前雲端硬碟容量已高達 <span style="font-size:18px;">${cacheEngine.poolRate}</span>！<br><br>
                        系統檢測觸發防爆機制：預計於 <span style="text-decoration:underline;">${dateStr}</span>，自動完全銷毀 <span style="font-size:16px; color:#ffd600;">${targetYear}年以前</span> 的所有歷史中轉快照檔案與紀錄！
                    `;
                    document.getElementById('purge-overlay').style.display = 'flex';
                }

                renderFileList(cacheEngine.todayFiles);
            } catch(err) { console.error("快取載入異常：", err); }
        }

        // 確認知曉並寫入日誌
        async function acknowledgePurgeNotification() {
            try {
                const identity = adminSession ? adminSession.name : "一般訪客";
                await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: "log_purge_ack", ip: globalUserIp, identity: identity })
                });
                sessionStorage.setItem("purge_ack", "true");
                document.getElementById('purge-overlay').style.display = 'none';
            } catch(e) { document.getElementById('purge-overlay').style.display = 'none'; }
        }

        function applyVisualTheme(theme) {
            const body = document.body;
            const loginBox = document.getElementById('login-box');
            const adminBox = document.getElementById('admin-box');
            if(theme === 'stealth') { 
                body.className = 'theme-dark-stealth'; 
                loginBox.classList.add('modal-dark-stealth');
                adminBox.classList.add('modal-dark-stealth');
            } else { 
                body.className = ''; 
                loginBox.classList.remove('modal-dark-stealth');
                adminBox.classList.remove('modal-dark-stealth');
            }
        }

        function handleFileSelect(input) {
            if(input.files.length === 0) return;
            const file = input.files[0];
            selectedFileName = file.name;
            document.getElementById('upload-hint').innerHTML = `<span style="color:#00e676; font-weight:bold;"><i class="fa-solid fa-file-circle-check"></i> 已選擇: ${selectedFileName}</span>`;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                selectedFileBase64 = e.target.result.split(',')[1];
                document.getElementById('upload-btn').disabled = false;
            };
            reader.readAsDataURL(file);
        }

        // 上傳檔案
        async function executeUpload() {
            const btn = document.getElementById('upload-btn');
            btn.disabled = true;
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> ⏳ 正在安全加密並同步至雲端核心...`;
            try {
                const response = await fetch(GAS_URL, {
                    method: "POST",
                    body: JSON.stringify({
                        action: "upload_file",
                        fileName: selectedFileName,
                        fileData: selectedFileBase64,
                        ip: globalUserIp,
                        uploaderName: adminSession ? adminSession.name : "一般訪客"
                    })
                });
                alert((await response.json()).message);
                selectedFileBase64 = ""; selectedFileName = "";
                document.getElementById('file-input').value = "";
                document.getElementById('upload-hint').innerHTML = `點擊選取或拖曳共享檔案至此`;
                await triggerCachePreload();
            } catch(e) { alert("❌ 同步核心異常。"); } 
            finally { btn.innerHTML = `<i class="fa-solid fa-shield-halved"></i> 同意條款並安全上傳`; }
        }

        // 取得清單
        async function fetchSharedList() {
            const dateStr = document.getElementById('archive-date').value;
            try {
                const res = await fetch(`${GAS_URL}?action=fetch_list&date=${dateStr}&ip=${globalUserIp}`);
                renderFileList((await res.json()).files);
            } catch(e) {}
        }

        // 渲染清單
        function renderFileList(files) {
            const container = document.getElementById('file-list-container');
            container.innerHTML = "";
            if(!files || files.length === 0) {
                container.innerHTML = `<div style="text-align:center; color:#90a4ae; padding:20px; font-size:14px;">📅 此日期查無資料共享項目紀錄</div>`;
                return;
            }
            files.forEach(file => {
                const item = document.createElement('div');
                item.className = 'file-item';
                const showDeleteBtn = (adminSession !== null) || (globalUserIp === file.ownerIp);
                item.innerHTML = `
                    <div class="file-info">
                        <div class="file-name"><i class="fa-regular fa-file-audio" style="color:#ffb74d;"></i> ${file.name}</div>
                        <div class="file-meta">上傳者: ${file.uploader} | 來源 IP: ${file.displayIp}</div>
                    </div>
                    <div class="file-actions">
                        <button class="action-btn btn-prev" onclick="window.open('${file.url}', '_blank')">預覽</button>
                        <button class="action-btn btn-down" onclick="window.open('${file.url}', '_blank')">下載</button>
                        ${showDeleteBtn ? `<button class="action-btn btn-del" onclick="handleDeleteFile('${file.id}')">移除</button>` : ''}
                    </div>
                `;
                container.appendChild(item);
            });
        }

        // 💥 刪除防呆確認
        async function handleDeleteFile(fileId) {
            if (!confirm("💥 確定要將此檔案自大數據中轉庫中完全銷毀嗎？\n\n注意：銷毀後資料將完全抹除。")) return;
            try {
                const response = await fetch(`${GAS_URL}?ip=${globalUserIp}`, {
                    method: 'POST',
                    body: JSON.stringify({ action: "delete_file", fileId: fileId, isCtrlMode: adminSession ? true : false })
                });
                alert((await response.json()).message);
                await triggerCachePreload();
            } catch (err) { alert("❌ 移除通訊異常。"); }
        }

        function openLoginModal() {
            if(adminSession) { openAdminHub(); } 
            else { document.getElementById('login-overlay').style.display = 'flex'; }
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        // 在地0秒極速登入
        function executeLogin() {
            const userInput = document.getElementById('login-user').value.trim();
            const passInput = document.getElementById('login-pass').value.trim();
            const matchCard = cacheEngine.cards.find(c => c.user === userInput && c.pass === passInput);
            if(matchCard) {
                adminSession = matchCard;
                closeModal('login-overlay');
                document.getElementById('admin-hub-btn').innerHTML = `<i class="fa-solid fa-unlock-keyhole"></i> 管理中 (${adminSession.name})`;
                document.getElementById('login-user').value = "";
                document.getElementById('login-pass').value = "";
                openAdminHub();
                fetchSharedList(); // 更新刪除按鈕權限
            } else { alert("❌ 安全核驗失敗！帳號或密碼錯誤。"); }
        }

        function executeLogout() {
            adminSession = null;
            document.getElementById('admin-hub-btn').innerHTML = `<i class="fa-solid fa-cube"></i> 管理端環境`;
            closeModal('admin-overlay');
            triggerCachePreload();
        }

        function openAdminHub() {
            document.getElementById('admin-overlay').style.display = 'flex';
            document.getElementById('cfg-theme').value = cacheEngine.siteTheme;
            document.getElementById('cfg-rules').value = cacheEngine.rawRules;
            document.getElementById('cfg-my-user').value = adminSession.user;
            document.getElementById('cfg-my-pass').value = "";

            if(adminSession.role === 'Supreme') {
                document.getElementById('tab-card-nav').style.display = 'block';
                renderCardList(cacheEngine.cards);
            } else { document.getElementById('tab-card-nav').style.display = 'none'; }

            renderPurgeSchedules(cacheEngine.purgeList || []);
            switchTab(0);
        }

        function switchTab(index) {
            for(let i=0; i<3; i++) {
                document.getElementById(`tab-${i}`).classList.remove('active');
                document.getElementsByClassName('tab-item')[i].classList.remove('active');
            }
            document.getElementById(`tab-${index}`).classList.add('active');
            document.getElementsByClassName('tab-item')[index].classList.add('active');
        }

        // 儲存全局設定
        async function saveGlobalSettings() {
            const theme = document.getElementById('cfg-theme').value;
            const rules = document.getElementById('cfg-rules').value;
            try {
                const res = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: "save_global", token: adminSession.token, theme: theme, rules: rules })
                });
                alert((await res.json()).message);
                closeModal('admin-overlay');
                await triggerCachePreload();
            } catch(e) { alert("儲存失敗"); }
        }

        // 修改個人帳密
        async function updateAdminProfile(type) {
            const targetUser = document.getElementById('cfg-my-user').value.trim();
            const targetPass = document.getElementById('cfg-my-pass').value.trim();
            if(!targetUser) return alert("帳號不可為空");
            if(type === 'pass' && !targetPass) return alert("請輸入想要變更的密碼");

            try {
                const res = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: "update_profile", token: adminSession.token, type: type, newUser: targetUser, newPass: targetPass })
                });
                const result = await res.json();
                alert(result.message);
                if(result.status === 'success') {
                    adminSession.user = targetUser;
                    if(type === 'pass') document.getElementById('cfg-my-pass').value = "";
                    await triggerCachePreload();
                }
            } catch(e) { alert("更新異常"); }
        }

        // 管理員預約排程
        async function registerAdminPurgeReservation() {
            try {
                const res = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: "create_purge_schedule", token: adminSession.token, creator: adminSession.name })
                });
                alert((await res.json()).message);
                closeModal('admin-overlay');
                await triggerCachePreload();
            } catch(e) { alert("預約失敗"); }
        }

        function renderPurgeSchedules(list) {
            const container = document.getElementById('purge-schedule-list');
            container.innerHTML = "";
            if(list.length === 0) {
                container.innerHTML = `<div style="font-size:12px; color:#90a4ae;">當前查無任何進行中或生效中的自動清理排程</div>`;
                return;
            }
            list.forEach(item => {
                const div = document.createElement('div');
                div.style = "display:flex; justify-content:space-between; align-items:center; background:rgba(255,255,255,0.05); padding:8px; border-radius:4px; margin-bottom:6px; font-size:12px;";
                div.innerHTML = `
                    <div>📌 預約銷毀年份：${item.targetYear}以前 <br> <span style="color:#ffb74d;">[發布者: ${item.creator}]</span> 預計執行日: ${item.execDate}</div>
                    <button class="action-btn btn-del" style="padding:4px 8px; font-size:11px;" onclick="executeRevokePurge('${item.rowId}')">撤銷排程</button>
                `;
                container.appendChild(div);
            });
        }

        // 撤銷排程
        async function executeRevokePurge(rowId) {
            if(!confirm("⚠️ 確定要撤銷此項自動清理排程嗎？撤銷動作將被記錄於後台。")) return;
            try {
                const res = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: "revoke_purge_schedule", token: adminSession.token, rowId: rowId, actor: adminSession.name })
                });
                alert((await res.json()).message);
                closeModal('admin-overlay');
                await triggerCachePreload();
            } catch(e) { alert("撤銷失敗"); }
        }

        // 渲染發卡庫與撤銷功能 (Supreme 專用)
        function renderCardList(cards) {
            const container = document.getElementById('card-list-container');
            container.innerHTML = "";
            cards.forEach(card => {
                const div = document.createElement('div');
                div.style = "display:flex; justify-content:space-between; align-items:center; background:rgba(0,0,0,0.2); padding:8px 12px; border-radius:4px; margin-bottom:6px; font-size:13px;";
                div.innerHTML = `
                    <div><strong>${card.name}</strong> (${card.user}) - <span style="color:#cfd8dc;">${card.role}</span></div>
                    ${card.role !== 'Supreme' ? `<button class="action-btn btn-del" style="padding:4px 8px; font-size:11px;" onclick="revokeCard('${card.token}')">撤銷</button>` : '<span style="color:#81c784; font-size:11px;">核心主卡</span>'}
                `;
                container.appendChild(div);
            });
        }

        async function issueNewCard() {
            const user = document.getElementById('new-card-user').value.trim();
            const pass = document.getElementById('new-card-pass').value.trim();
            const name = document.getElementById('new-card-name').value.trim();
            if(!user || !pass || !name) return alert("請填妥欄位");
            try {
                const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: "issue_card", token: adminSession.token, user: user, pass: pass, name: name }) });
                const result = await res.json();
                alert(result.message);
                if(result.status === 'success') {
                    document.getElementById('new-card-user').value = ""; document.getElementById('new-card-pass').value = ""; document.getElementById('new-card-name').value = "";
                    await triggerCachePreload();
                    renderCardList(cacheEngine.cards);
                }
            } catch(e) { alert("核發失敗"); }
        }

        async function revokeCard(targetToken) {
            if(!confirm("確定要吊銷此子管理員的權限嗎？")) return;
            try {
                const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: "revoke_card", token: adminSession.token, targetToken: targetToken }) });
                alert((await res.json()).message);
                await triggerCachePreload();
                renderCardList(cacheEngine.cards);
            } catch(e) { alert("撤銷失敗"); }
        }
    </script>
</body>
</html>
